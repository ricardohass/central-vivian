<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dra. Vivian Amaral — Central de Gestão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C; --gold-light: #E8D5A3; --gold-dim: #7A6030;
      --dark: #111010; --dark2: #1A1918; --dark3: #222120; --dark4: #2C2B2A;
      --text: #F0EBE0; --text-muted: #9A9188;
      --border: rgba(201,168,76,0.18); --border-hover: rgba(201,168,76,0.45);
      --c-mentoria: #C9A84C; --c-posgrad: #3B5FD4; --c-master: #A02020;
      --c-aberto: #2A7A5A; --c-thunder: #7A3DB5; --c-all: #5A5550;
    }
    html, body { height: 100%; background: var(--dark); color: var(--text); font-family: 'Jost', sans-serif; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--dark); } ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    /* TOPBAR */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px 14px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--dark); z-index: 50; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-monogram { width: 38px; height: 38px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--gold); font-weight: 300; }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 300; color: var(--text); letter-spacing: 2px; }
    .brand-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
    .nav { display: flex; gap: 4px; }
    .nav-btn { background: none; border: none; padding: 8px 18px; font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); cursor: pointer; transition: color .2s; position: relative; }
    .nav-btn:hover { color: var(--gold); }
    .nav-btn.active { color: var(--gold); }
    .nav-btn.active::after { content: ''; position: absolute; bottom: -15px; left: 0; right: 0; height: 1px; background: var(--gold); }

    /* LOADING */
    .loading-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity .4s; }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner { width: 32px; height: 32px; border: 1px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }

    .content { padding: 28px 28px; min-height: calc(100vh - 70px); }

    /* ICON BTN */
    .icon-btn { background: none; border: 0.5px solid var(--border); color: var(--text-muted); padding: 0 14px; height: 30px; border-radius: 2px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .icon-btn:hover, .icon-btn.active { border-color: var(--gold); color: var(--gold); }

    /* CALENDÁRIO */
    .week-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
    .week-nav { display: flex; align-items: center; gap: 10px; }
    .wnav-btn { background: none; border: 0.5px solid var(--border); color: var(--text-muted); width: 30px; height: 30px; border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all .2s; }
    .wnav-btn:hover { border-color: var(--gold); color: var(--gold); }
    .week-label { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--gold-light); letter-spacing: 1px; min-width: 220px; text-align: center; }
    .edit-hint-bar { display: none; font-size: 12px; color: var(--gold-dim); margin-bottom: 16px; padding: 9px 13px; border: 0.5px dashed var(--gold-dim); border-radius: 2px; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .day-col { background: var(--dark2); border: 0.5px solid var(--border); border-radius: 2px; overflow: hidden; min-height: 100px; transition: border-color .2s; }
    .day-col.today { border-color: var(--gold-dim); }
    .day-col.edit-active { cursor: pointer; }
    .day-col.edit-active:hover { border-color: var(--gold-dim); }
    .day-header { padding: 10px 8px 8px; border-bottom: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; }
    .day-name { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
    .day-num { font-size: 26px; font-family: 'Cormorant Garamond', serif; font-weight: 300; color: var(--text-muted); line-height: 1.1; margin-top: 2px; }
    .day-col.today .day-num, .day-col.today .day-name { color: var(--gold); }
    .day-events { padding: 6px; }
    .cal-event { font-size: 11px; padding: 4px 7px; border-radius: 1px; margin-bottom: 4px; line-height: 1.4; display: flex; justify-content: space-between; align-items: flex-start; gap: 4px; }
    .ev-mentoria  { background: rgba(201,168,76,0.13); border-left: 2px solid var(--c-mentoria); color: var(--c-mentoria); }
    .ev-posgrad   { background: rgba(59,95,212,0.15);  border-left: 2px solid var(--c-posgrad);  color: #7A9AEE; }
    .ev-master    { background: rgba(160,32,32,0.18);  border-left: 2px solid var(--c-master);   color: #D46060; }
    .ev-aberto    { background: rgba(42,122,90,0.15);  border-left: 2px solid var(--c-aberto);   color: #5DCAA5; }
    .ev-thunder   { background: rgba(122,61,181,0.15); border-left: 2px solid var(--c-thunder);  color: #B07AE8; }
    .ev-all       { background: rgba(90,85,80,0.2);    border-left: 2px solid var(--c-all);      color: var(--text-muted); }
    .ev-multi     { background: rgba(201,168,76,0.07); border-left: 2px solid var(--gold-dim);   color: var(--gold-light); }
    .ev-tags { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 3px; }
    .ev-tag { font-size: 9px; padding: 1px 5px; border-radius: 1px; }
    .ev-tag-mentoria { background: rgba(201,168,76,0.13); color: var(--c-mentoria); }
    .ev-tag-posgrad  { background: rgba(59,95,212,0.15);  color: #7A9AEE; }
    .ev-tag-master   { background: rgba(160,32,32,0.18);  color: #D46060; }
    .ev-tag-aberto   { background: rgba(42,122,90,0.15);  color: #5DCAA5; }
    .ev-tag-thunder  { background: rgba(122,61,181,0.15); color: #B07AE8; }
    .ev-tag-all      { background: rgba(90,85,80,0.2);    color: var(--text-muted); }
    .ev-rm { opacity: .35; cursor: pointer; font-size: 11px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
    .ev-rm:hover { opacity: 1; color: #fff; }
    .cal-legend { display: flex; gap: 14px; margin-top: 14px; flex-wrap: wrap; }
    .leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); }
    .leg-dot { width: 9px; height: 9px; border-radius: 1px; }

    /* PRODUTOS */
    .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .sec-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--gold-light); letter-spacing: 1px; }
    .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .prod-card { background: var(--dark2); border: 0.5px solid var(--border); border-radius: 2px; padding: 20px; cursor: pointer; transition: all .3s; position: relative; overflow: hidden; }
    .prod-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0; transition: opacity .3s; }
    .prod-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .prod-card:hover::before { opacity: 1; }
    .prod-badge { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 3px 9px; border-radius: 1px; display: inline-block; margin-bottom: 12px; border: 0.5px solid; }
    .prod-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
    .prod-tagline { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .prod-price { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold-light); font-weight: 300; margin-top: 10px; }
    .prod-price-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .prod-arrow { position: absolute; bottom: 16px; right: 16px; color: var(--gold-dim); font-size: 16px; transition: all .2s; }
    .prod-card:hover .prod-arrow { color: var(--gold); transform: translate(2px, -2px); }

    /* FICHA */
    .ficha-header { margin-bottom: 22px; }
    .ficha-badge { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px; border-radius: 1px; display: inline-block; margin-bottom: 12px; border: 0.5px solid; }
    .ficha-name { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 300; color: var(--text); line-height: 1.1; margin-bottom: 4px; }
    .ficha-tagline-el { font-size: 15px; color: var(--text-muted); line-height: 1.6; }
    .ficha-section { margin-bottom: 26px; }
    .ficha-section-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-dim); padding-bottom: 8px; border-bottom: 0.5px solid var(--border); margin-bottom: 14px; }
    .ficha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .ficha-grid.full { grid-template-columns: 1fr; }
    .ficha-field { display: flex; flex-direction: column; gap: 5px; }
    .ficha-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
    .ficha-value { font-size: 14px; color: var(--text); line-height: 1.5; min-height: 36px; padding: 7px 9px; background: var(--dark3); border: 0.5px solid var(--border); border-radius: 2px; cursor: default; transition: border-color .2s; white-space: pre-wrap; word-break: break-word; }
    .ficha-value.editable { cursor: text; }
    .ficha-value.editable:hover { border-color: var(--border-hover); }
    .ficha-value[contenteditable="true"] { outline: none; border-color: var(--gold-dim); cursor: text; }
    .ficha-value.empty { color: var(--dark4); font-style: italic; }
    .edit-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: 2px; }
    .edit-bar.active { background: rgba(201,168,76,0.06); border-color: var(--gold-dim); }
    .edit-bar span { font-size: 12px; color: var(--text-muted); letter-spacing: .5px; }
    .edit-bar.active span { color: var(--gold-dim); }
    .edit-bar-btns { display: flex; gap: 8px; }
    .btn-sm { background: none; border: 0.5px solid var(--border); color: var(--text-muted); font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 14px; border-radius: 2px; cursor: pointer; transition: all .2s; }
    .btn-sm:hover { border-color: var(--gold-dim); color: var(--text); }
    .btn-sm.primary { background: var(--gold-dim); border-color: var(--gold-dim); color: var(--dark); }
    .btn-sm.primary:hover { background: var(--gold); }
    .save-status { font-size: 11px; letter-spacing: 1px; color: var(--gold-dim); margin-right: 8px; }

    /* MODAIS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.87); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--dark2); border: 0.5px solid var(--border-hover); border-radius: 2px; width: min(740px, 96vw); max-height: 88vh; overflow-y: auto; padding: 32px; position: relative; }
    .mclose { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; transition: color .2s; }
    .mclose:hover { color: var(--gold); }
    .add-modal { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .add-modal.open { opacity: 1; pointer-events: all; }
    .add-box { background: var(--dark2); border: 0.5px solid var(--border-hover); border-radius: 2px; width: min(400px, 94%); padding: 28px; position: relative; }
    .add-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--gold-light); font-weight: 300; margin-bottom: 5px; }
    .add-date-lbl { font-size: 12px; color: var(--gold); letter-spacing: 1px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .field input { width: 100%; background: var(--dark3); border: 0.5px solid var(--border); color: var(--text); font-family: 'Jost', sans-serif; font-size: 14px; padding: 9px 11px; border-radius: 2px; outline: none; transition: border-color .2s; }
    .field input:focus { border-color: var(--gold-dim); }
    .checklist { display: flex; flex-direction: column; gap: 7px; }
    .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 9px 11px; border: 0.5px solid var(--border); border-radius: 2px; transition: border-color .2s; user-select: none; }
    .check-item:hover { border-color: var(--border-hover); }
    .check-item.checked { border-color: var(--gold-dim); }
    .check-box { width: 17px; height: 17px; border: 0.5px solid var(--border); border-radius: 1px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; color: var(--dark); transition: all .2s; }
    .check-item.checked .check-box { background: var(--gold-dim); border-color: var(--gold-dim); }
    .check-dot { width: 9px; height: 9px; border-radius: 1px; flex-shrink: 0; }
    .check-label { font-size: 13px; color: var(--text-muted); }
    .check-item.checked .check-label { color: var(--text); }
    .add-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-primary { flex: 1; background: var(--gold-dim); border: none; color: var(--dark); font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; padding: 11px; border-radius: 2px; cursor: pointer; transition: background .2s; }
    .btn-primary:hover { background: var(--gold); }
    .btn-cancel { background: none; border: 0.5px solid var(--border); color: var(--text-muted); font-family: 'Jost', sans-serif; font-size: 12px; padding: 11px 18px; border-radius: 2px; cursor: pointer; transition: all .2s; }
    .btn-cancel:hover { border-color: var(--gold-dim); color: var(--text); }
    .mclose-sm { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 17px; transition: color .2s; }
    .mclose-sm:hover { color: var(--gold); }

    /* TIME */
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
    .team-card { background: var(--dark2); border: 0.5px solid var(--border); border-radius: 2px; padding: 24px; transition: border-color .2s; }
    .team-card:hover { border-color: var(--border-hover); }
    .team-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--dark4); border: 1px solid var(--gold-dim); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--gold); margin-bottom: 16px; }
    .team-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--text); margin-bottom: 3px; }
    .team-role { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 14px; }
    .team-resp { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .team-resp li { font-size: 13px; color: var(--text-muted); display: flex; align-items: flex-start; gap: 8px; line-height: 1.4; }
    .team-resp li::before { content: '—'; color: var(--gold-dim); flex-shrink: 0; }
    .team-add { background: none; border: 0.5px dashed var(--gold-dim); border-radius: 2px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; color: var(--gold-dim); font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: all .2s; min-height: 190px; width: 100%; }
    .team-add:hover { border-color: var(--gold); color: var(--gold); }
    .team-add i { font-size: 26px; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Carregando central</div>
</div>

<div class="topbar">
  <div class="brand">
    <div class="brand-monogram">VA</div>
    <div>
      <div class="brand-name">Dra. Vivian Amaral</div>
      <div class="brand-sub">Central de Gestão</div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('calendario',this)">Calendário</button>
    <button class="nav-btn" onclick="switchTab('produtos',this)">Produtos</button>
    <button class="nav-btn" onclick="switchTab('time',this)">Time</button>
  </nav>
</div>

<div class="content">
  <div id="tab-calendario">
    <div class="week-toolbar">
      <div class="week-nav">
        <button class="wnav-btn" onclick="changeWeek(-1)"><i class="ti ti-chevron-left"></i></button>
        <div class="week-label" id="week-label"></div>
        <button class="wnav-btn" onclick="changeWeek(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="icon-btn" onclick="goToday()">Hoje</button>
        <button class="icon-btn" id="edit-btn" onclick="toggleEdit()"><i class="ti ti-pencil" style="font-size:12px"></i><span id="edit-lbl">Editar</span></button>
      </div>
    </div>
    <div class="edit-hint-bar" id="edit-hint-bar"><i class="ti ti-info-circle" style="vertical-align:-2px;margin-right:6px"></i>Modo edição — clique em qualquer dia para adicionar. Clique × para remover.</div>
    <div class="week-grid" id="week-grid"></div>
    <div class="cal-legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-mentoria)"></div>Mentoria</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-posgrad)"></div>Pós Graduação</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-master)"></div>Master Leggacy</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-aberto)"></div>Público Aberto</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-thunder)"></div>Thunder Legacy</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-all)"></div>Todos</div>
    </div>
  </div>

  <div id="tab-produtos" style="display:none">
    <div class="sec-header"><div class="sec-title">Produtos</div></div>
    <div class="prod-grid" id="prod-grid"></div>
  </div>

  <div id="tab-time" style="display:none">
    <div class="sec-header"><div class="sec-title">Time Interno</div></div>
    <div class="team-grid" id="team-grid"></div>
  </div>
</div>

<!-- Modal produto -->
<div class="modal-overlay" id="prod-modal" onclick="if(event.target===this)closeProd()">
  <div class="modal">
    <button class="mclose" onclick="closeProd()"><i class="ti ti-x"></i></button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Modal add evento -->
<div class="add-modal" id="add-modal" onclick="if(event.target===this)closeAdd()">
  <div class="add-box">
    <button class="mclose-sm" onclick="closeAdd()"><i class="ti ti-x"></i></button>
    <h3>Adicionar evento</h3>
    <div class="add-date-lbl" id="add-date-lbl"></div>
    <div class="field"><label>Título</label><input type="text" id="ev-label" placeholder="ex: Aula módulo 5 — 19h30"></div>
    <div class="field"><label>Produtos / grupos</label><div class="checklist" id="checklist"></div></div>
    <div class="add-actions">
      <button class="btn-cancel" onclick="closeAdd()">Cancelar</button>
      <button class="btn-primary" onclick="confirmAdd()">Adicionar</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://zcfpurlpebhymlayrohn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjZnB1cmxwZWJoeW1sYXlyb2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2Njg2ODgsImV4cCI6MjA5NjI0NDY4OH0.PTMAtd8uzU7SxMNBsfdVpE95Kr4ZHTb39XXprNhjIko';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAYS_SHORT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const PRODUCT_OPTIONS = [
    {key:'mentoria', label:'Mentoria ÍntimaPro', color:'#C9A84C'},
    {key:'posgrad',  label:'Pós Graduação',      color:'#3B5FD4'},
    {key:'master',   label:'Master Leggacy',     color:'#A02020'},
    {key:'aberto',   label:'Público Aberto',     color:'#2A7A5A'},
    {key:'thunder',  label:'Thunder Legacy',     color:'#7A3DB5'},
    {key:'all',      label:'Todos',              color:'#5A5550'},
  ];
  const FICHA_SECTIONS = [
    {title:'01 — Identidade', fields:[
      {key:'status',label:'Status'},{key:'publicoAlvo',label:'Público-alvo'},
      {key:'problema',label:'Problema que resolve'},{key:'promessa',label:'Promessa principal'},
      {key:'frequencia',label:'Frequência / periodicidade'},{key:'modeloContratacao',label:'Modelo de contratação'},
    ]},
    {title:'02 — Apresentação comercial', fields:[
      {key:'linkApresentacao',label:'Link da apresentação'},
      {key:'linkVSL',label:'Link do vídeo de vendas (VSL)'},
      {key:'linkPaginaVendas',label:'Página de vendas / formulário'},
    ]},
    {title:'03 — Pagamento', fields:[
      {key:'precoIntegral',label:'Preço integral'},
      {key:'precoMentoria',label:'Preço alunos Mentoria'},
      {key:'formaPagamento',label:'Formas de pagamento'},
      {key:'linkPagamento',label:'Link de pagamento'},
    ]},
    {title:'04 — Bônus', fields:[
      {key:'bonusFixo',label:'Bônus fixo'},
      {key:'bonusFechamento',label:'Bônus de fechamento'},
    ]},
    {title:'05 — Entrega', fields:[
      {key:'oQueIncluso',label:'O que está incluso'},
      {key:'linksGrupos',label:'Links dos grupos de alunos'},
      {key:'politicaCancelamento',label:'Política de cancelamento'},
    ]},
    {title:'06 — Observações', fields:[
      {key:'observacoes',label:'Observações / avisos'},
    ]},
  ];

  let EVENTS = [];
  let PRODUCTS = [];
  let anchorMonday = getMondayOf(new Date());
  let editMode = false;
  let addTarget = null;
  let currentProdId = null;

  /* ── INIT ── */
  async function init() {
    const [evRes, prRes] = await Promise.all([
      sb.from('events').select('*').order('date'),
      sb.from('products').select('*'),
    ]);
    EVENTS   = evRes.data  || [];
    PRODUCTS = prRes.data  || [];
    document.getElementById('loading').classList.add('hidden');
    renderWeek();
  }

  /* ── UTILS ── */
  function getMondayOf(d) {
    const day = d.getDay();
    const diff = d.getDate() - (day === 0 ? 6 : day - 1);
    return new Date(d.getFullYear(), d.getMonth(), diff);
  }
  function dateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  /* ── CALENDÁRIO ── */
  function changeWeek(dir) { anchorMonday = new Date(anchorMonday.getFullYear(), anchorMonday.getMonth(), anchorMonday.getDate() + dir*7); renderWeek(); }
  function goToday()       { anchorMonday = getMondayOf(new Date()); renderWeek(); }
  function toggleEdit() {
    editMode = !editMode;
    document.getElementById('edit-btn').classList.toggle('active', editMode);
    document.getElementById('edit-lbl').textContent = editMode ? 'Concluir' : 'Editar';
    document.getElementById('edit-hint-bar').style.display = editMode ? 'block' : 'none';
    renderWeek();
  }

  function renderWeek() {
    const end = new Date(anchorMonday.getFullYear(), anchorMonday.getMonth(), anchorMonday.getDate() + 6);
    const sM = MONTHS[anchorMonday.getMonth()].substring(0,3);
    const eM = MONTHS[end.getMonth()].substring(0,3);
    document.getElementById('week-label').textContent =
      anchorMonday.getMonth() === end.getMonth()
        ? `${anchorMonday.getDate()} — ${end.getDate()} de ${sM} ${end.getFullYear()}`
        : `${anchorMonday.getDate()} ${sM} — ${end.getDate()} ${eM} ${end.getFullYear()}`;
    const grid = document.getElementById('week-grid');
    grid.innerHTML = '';
    const todayStr = dateStr(new Date());
    for (let i = 0; i < 7; i++) {
      const d   = new Date(anchorMonday.getFullYear(), anchorMonday.getMonth(), anchorMonday.getDate() + i);
      const ds  = dateStr(d);
      const col = document.createElement('div');
      col.className = 'day-col' + (ds === todayStr ? ' today' : '') + (editMode ? ' edit-active' : '');
      const evs = EVENTS.filter(e => e.date === ds);
      let evHtml = '';
      evs.forEach((e) => {
        const prods = e.products || [];
        const cls = prods.length === 1 ? 'ev-' + prods[0] : 'ev-multi';
        const rm  = editMode ? `<span class="ev-rm" onclick="removeEv(event,'${e.id}')">×</span>` : '';
        const tags = prods.length > 1
          ? `<div class="ev-tags">${prods.map(p => `<span class="ev-tag ev-tag-${p}">${PRODUCT_OPTIONS.find(o=>o.key===p)?.label||p}</span>`).join('')}</div>`
          : '';
        evHtml += `<div class="cal-event ${cls}"><div><div>${e.label}</div>${tags}</div>${rm}</div>`;
      });
      col.innerHTML = `<div class="day-header"><div class="day-name">${DAYS_SHORT[d.getDay()]}</div><div class="day-num">${d.getDate()}</div></div><div class="day-events">${evHtml}</div>`;
      if (editMode) col.addEventListener('click', () => openAdd(ds, d));
      grid.appendChild(col);
    }
  }

  function openAdd(ds, d) {
    addTarget = ds;
    document.getElementById('add-date-lbl').textContent = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    document.getElementById('ev-label').value = '';
    document.getElementById('checklist').innerHTML = PRODUCT_OPTIONS.map(o => `
      <div class="check-item" data-key="${o.key}" onclick="toggleCheck(this)">
        <div class="check-box"></div>
        <div class="check-dot" style="background:${o.color}"></div>
        <span class="check-label">${o.label}</span>
      </div>`).join('');
    document.getElementById('add-modal').classList.add('open');
  }
  function closeAdd() { document.getElementById('add-modal').classList.remove('open'); addTarget = null; }

  function toggleCheck(el) {
    if (el.dataset.key === 'all') {
      const will = !el.classList.contains('checked');
      document.querySelectorAll('#checklist .check-item').forEach(ci => ci.classList.remove('checked'));
      if (will) el.classList.add('checked');
    } else {
      document.querySelectorAll('#checklist .check-item[data-key="all"]').forEach(ci => ci.classList.remove('checked'));
      el.classList.toggle('checked');
    }
    document.querySelectorAll('#checklist .check-item.checked .check-box').forEach(b => b.textContent = '✓');
    document.querySelectorAll('#checklist .check-item:not(.checked) .check-box').forEach(b => b.textContent = '');
  }

  async function confirmAdd() {
    const label    = document.getElementById('ev-label').value.trim();
    const products = [...document.querySelectorAll('#checklist .check-item.checked')].map(el => el.dataset.key);
    if (!label || !addTarget) return;
    if (!products.length) { alert('Selecione ao menos um produto.'); return; }
    const { data, error } = await sb.from('events').insert({ date: addTarget, label, products }).select().single();
    if (!error) { EVENTS.push(data); }
    closeAdd(); renderWeek();
  }

  async function removeEv(e, id) {
    e.stopPropagation();
    await sb.from('events').delete().eq('id', id);
    EVENTS = EVENTS.filter(ev => ev.id !== id);
    renderWeek();
  }

  /* ── PRODUTOS ── */
  function renderProducts() {
    const grid = document.getElementById('prod-grid');
    grid.innerHTML = '';
    PRODUCTS.forEach(p => {
      const f = p.ficha || {};
      const el = document.createElement('div');
      el.className = 'prod-card';
      el.innerHTML = `
        <div class="prod-badge" style="color:${p.color};border-color:${p.badge_border}">${p.badge}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-tagline">${p.tagline}</div>
        <div class="prod-price">${f.precoIntegral || '—'}</div>
        <div class="prod-price-label">${f.frequencia || ''}</div>
        <div class="prod-arrow"><i class="ti ti-arrow-up-right"></i></div>`;
      el.onclick = () => openProduct(p);
      grid.appendChild(el);
    });
  }

  function openProduct(p) {
    currentProdId = p.id;
    renderFicha(p, false);
    document.getElementById('prod-modal').classList.add('open');
  }
  function closeProd() {
    document.getElementById('prod-modal').classList.remove('open');
    currentProdId = null;
  }

  function renderFicha(p, editing) {
    const f = p.ficha || {};
    const sectionsHtml = FICHA_SECTIONS.map(s => {
      const fieldsHtml = s.fields.map(field => {
        const val = f[field.key] || '';
        const edAttr = editing ? 'contenteditable="true"' : '';
        const cls    = 'ficha-value' + (editing ? ' editable' : '') + (val ? '' : ' empty');
        return `<div class="ficha-field">
          <div class="ficha-label">${field.label}</div>
          <div class="${cls}" data-key="${field.key}" ${edAttr}>${val || (editing ? '' : '—')}</div>
        </div>`;
      }).join('');
      return `<div class="ficha-section">
        <div class="ficha-section-title">${s.title}</div>
        <div class="ficha-grid${s.fields.length === 1 ? ' full' : ''}">${fieldsHtml}</div>
      </div>`;
    }).join('');

    const editBar = editing
      ? `<div class="edit-bar active"><span><i class="ti ti-pencil" style="vertical-align:-2px;margin-right:6px"></i>Editando — clique em qualquer campo</span><div class="edit-bar-btns"><span class="save-status" id="save-status"></span><button class="btn-sm" onclick="cancelEdit()">Cancelar</button><button class="btn-sm primary" onclick="saveEdit('${p.id}')">Salvar</button></div></div>`
      : `<div class="edit-bar"><span>Ficha do produto</span><div class="edit-bar-btns"><button class="btn-sm" onclick="startEdit('${p.id}')"><i class="ti ti-pencil" style="font-size:12px;vertical-align:-2px;margin-right:4px"></i>Editar</button></div></div>`;

    document.getElementById('modal-body').innerHTML = `
      <div class="ficha-header">
        <div class="ficha-badge" style="color:${p.color};border-color:${p.badge_border}">${p.badge}</div>
        <div class="ficha-name">${p.name}</div>
        <div class="ficha-tagline-el">${p.tagline}</div>
      </div>
      ${editBar}
      ${sectionsHtml}`;
  }

  function startEdit(id) {
    const p = PRODUCTS.find(x => x.id === id);
    if (p) renderFicha(p, true);
  }
  function cancelEdit() {
    const p = PRODUCTS.find(x => x.id === currentProdId);
    if (p) renderFicha(p, false);
  }

  async function saveEdit(id) {
    const p = PRODUCTS.find(x => x.id === id);
    if (!p) return;
    const statusEl = document.getElementById('save-status');
    if (statusEl) statusEl.textContent = 'Salvando...';
    const updatedFicha = { ...(p.ficha || {}) };
    document.querySelectorAll('.ficha-value[data-key]').forEach(el => {
      updatedFicha[el.dataset.key] = el.textContent.trim();
    });
    const { error } = await sb.from('products').update({ ficha: updatedFicha, updated_at: new Date().toISOString() }).eq('id', id);
    if (!error) {
      p.ficha = updatedFicha;
      renderFicha(p, false);
      renderProducts();
    } else {
      if (statusEl) statusEl.textContent = 'Erro ao salvar.';
    }
  }

  /* ── TIME ── */
  const TEAM = [
    {initials:'VA', name:'Dra. Vivian Amaral', role:'Expert & Fundadora', resp:['Criação e entrega de conteúdo','Aulas e lives ao vivo','Posicionamento e estratégia']},
    {initials:'—',  name:'[Nome]',             role:'Gestor(a) de Tráfego',    resp:['Campanhas pagas','Relatórios de performance','Testes de criativos']},
    {initials:'—',  name:'[Nome]',             role:'Produtor(a) de Conteúdo', resp:['Roteiros e edição','Calendário editorial','Entrega de materiais']},
    {initials:'—',  name:'[Nome]',             role:'Atendimento / CS',        resp:['Suporte a alunos','Gestão de grupos','Onboarding de novos alunos']},
  ];
  function renderTeam() {
    const grid = document.getElementById('team-grid');
    grid.innerHTML = '';
    TEAM.forEach(m => {
      const el = document.createElement('div'); el.className = 'team-card';
      el.innerHTML = `<div class="team-avatar">${m.initials}</div><div class="team-name">${m.name}</div><div class="team-role">${m.role}</div><ul class="team-resp">${m.resp.map(r=>`<li>${r}</li>`).join('')}</ul>`;
      grid.appendChild(el);
    });
    const add = document.createElement('button'); add.className = 'team-add';
    add.innerHTML = '<i class="ti ti-plus"></i>Adicionar membro';
    add.onclick = () => alert('Para adicionar um membro, edite o array TEAM no arquivo index.html.');
    grid.appendChild(add);
  }

  /* ── TABS ── */
  function switchTab(tab, btn) {
    ['calendario','produtos','time'].forEach(t => { document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none'; });
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'calendario') renderWeek();
    if (tab === 'produtos')   renderProducts();
    if (tab === 'time')       renderTeam();
  }

  init();
</script>
</body>
</html>
