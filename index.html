<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dra. Vivian Amaral — Central de Gestão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#C9A84C;--gold-light:#E8D5A3;--gold-dim:#7A6030;
      --dark:#111010;--dark2:#1A1918;--dark3:#222120;--dark4:#2C2B2A;
      --text:#F0EBE0;--text-muted:#9A9188;
      --border:rgba(201,168,76,0.18);--border-hover:rgba(201,168,76,0.45);
    }
    html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Jost',sans-serif}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark)}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px 14px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--dark);z-index:50}
    .brand{display:flex;align-items:center;gap:12px}
    .brand-monogram{width:38px;height:38px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold);font-weight:300}
    .brand-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text);letter-spacing:2px}
    .brand-sub{font-size:11px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
    .nav{display:flex;gap:4px}
    .nav-btn{background:none;border:none;padding:8px 18px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:color .2s;position:relative}
    .nav-btn:hover{color:var(--gold)}
    .nav-btn.active{color:var(--gold)}
    .nav-btn.active::after{content:'';position:absolute;bottom:-15px;left:0;right:0;height:1px;background:var(--gold)}

    /* LOADING */
    .loading-overlay{position:fixed;inset:0;background:var(--dark);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
    .loading-overlay.hidden{opacity:0;pointer-events:none}
    .loading-spinner{width:32px;height:32px;border:1px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted)}

    .content{padding:28px;min-height:calc(100vh - 70px)}

    /* ICON BTN */
    .icon-btn{background:none;border:0.5px solid var(--border);color:var(--text-muted);padding:0 16px;height:34px;border-radius:2px;cursor:pointer;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
    .icon-btn:hover,.icon-btn.active{border-color:var(--gold);color:var(--gold)}

    /* CALENDÁRIO */
    .week-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
    .week-nav{display:flex;align-items:center;gap:12px}
    .wnav-btn{background:none;border:0.5px solid var(--border);color:var(--text-muted);width:34px;height:34px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
    .wnav-btn:hover{border-color:var(--gold);color:var(--gold)}
    .week-label{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--gold-light);letter-spacing:1px;min-width:240px;text-align:center}
    .edit-hint-bar{display:none;font-size:13px;color:var(--gold-dim);margin-bottom:18px;padding:10px 14px;border:0.5px dashed var(--gold-dim);border-radius:2px}

    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .day-col{background:var(--dark2);border:0.5px solid var(--border);border-radius:3px;overflow:hidden;min-height:140px;display:flex;flex-direction:column;transition:border-color .2s}
    .day-col.today{border-color:var(--gold)}
    .day-col.edit-active{cursor:pointer}
    .day-col.edit-active:hover{border-color:var(--gold-dim)}

    .day-header{padding:12px 8px 10px;border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
    .day-name{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
    .day-num{font-size:34px;font-family:'Cormorant Garamond',serif;font-weight:300;color:var(--text-muted);line-height:1}
    .day-col.today .day-num,.day-col.today .day-name{color:var(--gold)}

    .day-events{padding:8px 7px;display:flex;flex-direction:column;gap:5px;flex:1}

    /* eventos — tamanho generoso */
    .cal-event{font-size:13px;padding:7px 9px;border-radius:2px;line-height:1.4;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
    .ev-rm{opacity:.35;cursor:pointer;font-size:14px;flex-shrink:0;line-height:1;margin-top:1px}
    .ev-rm:hover{opacity:1;color:#fff}
    .ev-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
    .ev-tag{font-size:10px;padding:2px 7px;border-radius:1px}

    /* LEGENDA — destaque total */
    .cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px;padding:16px 18px;background:var(--dark2);border:0.5px solid var(--border);border-radius:3px}
    .leg-item{display:flex;align-items:center;gap:9px}
    .leg-dot{width:13px;height:13px;border-radius:2px;flex-shrink:0}
    .leg-name{font-size:14px;color:var(--text)}

    /* PRODUTOS */
    .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
    .sec-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold-light);letter-spacing:1px}
    .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .prod-card{background:var(--dark2);border:0.5px solid var(--border);border-radius:3px;padding:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
    .prod-card:hover{transform:translateY(-2px)}
    .prod-badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:2px;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;font-weight:500}
    .prod-badge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .prod-name{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--text);margin-bottom:6px;line-height:1.2}
    .prod-tagline{font-size:13px;color:var(--text-muted);line-height:1.5}
    .prod-price{font-family:'Cormorant Garamond',serif;font-size:23px;color:var(--gold-light);font-weight:300;margin-top:12px}
    .prod-price-label{font-size:11px;color:var(--text-muted);margin-top:2px}
    .prod-arrow{position:absolute;bottom:16px;right:16px;font-size:16px;transition:all .2s}
    .prod-card:hover .prod-arrow{transform:translate(2px,-2px)}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--dark2);border:0.5px solid var(--border-hover);border-radius:3px;width:min(740px,96vw);max-height:88vh;overflow-y:auto;padding:32px;position:relative}
    .mclose{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;transition:color .2s}
    .mclose:hover{color:var(--gold)}

    /* FICHA */
    .ficha-header{margin-bottom:22px}
    .ficha-badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:2px;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;font-weight:500}
    .ficha-badge-dot{width:8px;height:8px;border-radius:50%}
    .ficha-name{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;color:var(--text);line-height:1.1;margin-bottom:4px}
    .ficha-tagline-el{font-size:15px;color:var(--text-muted);line-height:1.6}
    .ficha-section{margin-bottom:26px}
    .ficha-section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);padding-bottom:8px;border-bottom:0.5px solid var(--border);margin-bottom:14px}
    .ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ficha-grid.full{grid-template-columns:1fr}
    .ficha-field{display:flex;flex-direction:column;gap:5px}
    .ficha-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted)}
    .ficha-value{font-size:14px;color:var(--text);line-height:1.5;min-height:36px;padding:7px 9px;background:var(--dark3);border:0.5px solid var(--border);border-radius:2px;transition:border-color .2s;white-space:pre-wrap;word-break:break-word}
    .ficha-value.editable:hover{border-color:var(--border-hover);cursor:text}
    .ficha-value[contenteditable="true"]{outline:none;border-color:var(--gold-dim);cursor:text}
    .ficha-value.empty{color:var(--dark4);font-style:italic}
    .edit-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:10px 14px;border:0.5px solid var(--border);border-radius:2px}
    .edit-bar.active{background:rgba(201,168,76,0.06);border-color:var(--gold-dim)}
    .edit-bar span{font-size:12px;color:var(--text-muted)}
    .edit-bar.active span{color:var(--gold-dim)}
    .edit-bar-btns{display:flex;gap:8px;align-items:center}
    .btn-sm{background:none;border:0.5px solid var(--border);color:var(--text-muted);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:2px;cursor:pointer;transition:all .2s}
    .btn-sm:hover{border-color:var(--gold-dim);color:var(--text)}
    .btn-sm.primary{background:var(--gold-dim);border-color:var(--gold-dim);color:var(--dark)}
    .btn-sm.primary:hover{background:var(--gold)}
    .save-status{font-size:11px;letter-spacing:1px;color:var(--gold-dim)}

    /* ADD MODAL */
    .add-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .add-modal.open{opacity:1;pointer-events:all}
    .add-box{background:var(--dark2);border:0.5px solid var(--border-hover);border-radius:3px;width:min(400px,94%);padding:28px;position:relative}
    .add-box h3{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold-light);font-weight:300;margin-bottom:5px}
    .add-date-lbl{font-size:13px;color:var(--gold);letter-spacing:1px;margin-bottom:20px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
    .field input{width:100%;background:var(--dark3);border:0.5px solid var(--border);color:var(--text);font-family:'Jost',sans-serif;font-size:14px;padding:9px 11px;border-radius:2px;outline:none;transition:border-color .2s}
    .field input:focus{border-color:var(--gold-dim)}
    .checklist{display:flex;flex-direction:column;gap:7px}
    .check-item{display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 12px;border:0.5px solid var(--border);border-radius:2px;transition:border-color .2s;user-select:none}
    .check-item:hover{border-color:var(--border-hover)}
    .check-item.checked{border-color:var(--gold-dim)}
    .check-box{width:17px;height:17px;border:0.5px solid var(--border);border-radius:1px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--dark);transition:all .2s}
    .check-item.checked .check-box{background:var(--gold-dim);border-color:var(--gold-dim)}
    .check-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
    .check-label{font-size:14px;color:var(--text-muted)}
    .check-item.checked .check-label{color:var(--text)}
    .add-actions{display:flex;gap:10px;margin-top:22px}
    .btn-primary{flex:1;background:var(--gold-dim);border:none;color:var(--dark);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:11px;border-radius:2px;cursor:pointer;transition:background .2s}
    .btn-primary:hover{background:var(--gold)}
    .btn-cancel{background:none;border:0.5px solid var(--border);color:var(--text-muted);font-family:'Jost',sans-serif;font-size:12px;padding:11px 18px;border-radius:2px;cursor:pointer;transition:all .2s}
    .btn-cancel:hover{border-color:var(--gold-dim);color:var(--text)}
    .mclose-sm{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:17px;transition:color .2s}
    .mclose-sm:hover{color:var(--gold)}

    /* TIME */
    .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
    .team-card{background:var(--dark2);border:0.5px solid var(--border);border-radius:3px;padding:24px;transition:border-color .2s}
    .team-card:hover{border-color:var(--border-hover)}
    .team-avatar{width:50px;height:50px;border-radius:50%;background:var(--dark4);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);margin-bottom:16px}
    .team-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text);margin-bottom:3px}
    .team-role{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:14px}
    .team-resp{list-style:none;display:flex;flex-direction:column;gap:7px}
    .team-resp li{font-size:13px;color:var(--text-muted);display:flex;align-items:flex-start;gap:8px;line-height:1.4}
    .team-resp li::before{content:'—';color:var(--gold-dim);flex-shrink:0}
    .team-add{background:none;border:0.5px dashed var(--gold-dim);border-radius:3px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:var(--gold-dim);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;min-height:190px;width:100%}
    .team-add:hover{border-color:var(--gold);color:var(--gold)}
    .team-add i{font-size:26px}
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Carregando central</div>
</div>

<div class="topbar">
  <div class="brand">
    <div class="brand-monogram">VA</div>
    <div>
      <div class="brand-name">Dra. Vivian Amaral</div>
      <div class="brand-sub">Central de Gestão</div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('calendario',this)">Calendário</button>
    <button class="nav-btn" onclick="switchTab('produtos',this)">Produtos</button>
    <button class="nav-btn" onclick="switchTab('time',this)">Time</button>
    <button class="nav-btn" onclick="switchTab('acessos',this)">Acessos</button>
  </nav>
</div>

<div class="content">
  <div id="tab-calendario">
    <div class="week-toolbar">
      <div class="week-nav">
        <button class="wnav-btn" onclick="changeWeek(-1)"><i class="ti ti-chevron-left"></i></button>
        <div class="week-label" id="week-label"></div>
        <button class="wnav-btn" onclick="changeWeek(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="icon-btn" onclick="goToday()">Hoje</button>
        <button class="icon-btn" id="edit-btn" onclick="toggleEdit()"><i class="ti ti-pencil" style="font-size:13px"></i><span id="edit-lbl">Editar</span></button>
      </div>
    </div>
    <div class="edit-hint-bar" id="edit-hint-bar"><i class="ti ti-info-circle" style="vertical-align:-2px;margin-right:6px"></i>Modo edição — clique em qualquer dia para adicionar. Clique × para remover.</div>
    <div class="week-grid" id="week-grid"></div>
    <div class="cal-legend" id="cal-legend"></div>
  </div>

  <div id="tab-produtos" style="display:none">
    <div class="sec-header"><div class="sec-title">Produtos</div></div>
    <div class="prod-grid" id="prod-grid"></div>
  </div>

  <div id="tab-time" style="display:none">
    <div class="sec-header"><div class="sec-title">Time Interno</div></div>
    <div class="team-grid" id="team-grid"></div>
  </div>

  <div id="tab-acessos" style="display:none">
    <div class="sec-header">
      <div class="sec-title">Acessos</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:12px;color:var(--text-muted);letter-spacing:1px"><i class="ti ti-lock" style="vertical-align:-2px;margin-right:5px"></i>Visível apenas para administradores</span>
        <button class="icon-btn" onclick="openEditAcesso(null)"><i class="ti ti-plus" style="font-size:13px"></i> Novo acesso</button>
      </div>
    </div>
    <div class="acessos-grid" id="acessos-grid"></div>
  </div>

  <!-- Modal editar/novo acesso -->
  <div class="add-modal" id="acesso-modal" onclick="if(event.target===this)closeAcessoModal()">
    <div class="add-box" style="width:min(460px,95%)">
      <button class="mclose-sm" onclick="closeAcessoModal()"><i class="ti ti-x"></i></button>
      <h3 id="acesso-modal-title">Novo acesso</h3>
      <div style="margin-bottom:20px"></div>
      <div class="field"><label>Plataforma</label><input type="text" id="af-plataforma" placeholder="ex: Instagram, Hotmart..."></div>
      <div class="field"><label>URL</label><input type="text" id="af-url" placeholder="https://..."></div>
      <div class="field"><label>Login / usuário</label><input type="text" id="af-login" placeholder="email ou usuário"></div>
      <div class="field"><label>Senha</label><input type="text" id="af-senha" placeholder="senha"></div>
      <div class="field"><label>Observações</label><input type="text" id="af-obs" placeholder="avisos, pendências..."></div>
      <div class="add-actions">
        <button class="btn-cancel" id="acesso-delete-btn" onclick="deleteAcesso()" style="display:none;border-color:rgba(192,70,58,0.4);color:#C0463A">Excluir</button>
        <button class="btn-cancel" onclick="closeAcessoModal()">Cancelar</button>
        <button class="btn-primary" onclick="saveAcesso()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="prod-modal" onclick="if(event.target===this)closeProd()">
  <div class="modal">
    <button class="mclose" onclick="closeProd()"><i class="ti ti-x"></i></button>
    <div id="modal-body"></div>
  </div>
</div>

<div class="add-modal" id="add-modal" onclick="if(event.target===this)closeAdd()">
  <div class="add-box">
    <button class="mclose-sm" onclick="closeAdd()"><i class="ti ti-x"></i></button>
    <h3>Adicionar evento</h3>
    <div class="add-date-lbl" id="add-date-lbl"></div>
    <div class="field"><label>Título</label><input type="text" id="ev-label" placeholder="ex: Aula módulo 5 — 19h30"></div>
    <div class="field"><label>Produtos / grupos</label><div class="checklist" id="checklist"></div></div>
    <div class="add-actions">
      <button class="btn-cancel" onclick="closeAdd()">Cancelar</button>
      <button class="btn-primary" onclick="confirmAdd()">Adicionar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://zcfpurlpebhymlayrohn.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjZnB1cmxwZWJoeW1sYXlyb2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2Njg2ODgsImV4cCI6MjA5NjI0NDY4OH0.PTMAtd8uzU7SxMNBsfdVpE95Kr4ZHTb39XXprNhjIko';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_SHORT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// Fonte única de cores — calendário E produtos usam a mesma referência
const PRODUCT_OPTIONS=[
  {key:'mentoria', label:'Mentoria ÍntimaPro', color:'#C9A84C', bg:'rgba(201,168,76,0.14)'},

  {key:'master',   label:'Master Leggacy',     color:'#C0463A', bg:'rgba(192,70,58,0.14)'},

let EVENTS=[];
let PRODUCTS=[];
let anchorMonday=getMondayOf(new Date());
let editMode=false;
let addTarget=null;
let currentProdId=null;

async function init(){
  const[evRes,prRes]=await Promise.all([
    sb.from('events').select('*').order('date'),
    sb.from('products').select('*'),
  ]);
  EVENTS=evRes.data||[];
  PRODUCTS=prRes.data||[];
  document.getElementById('loading').classList.add('hidden');
  renderWeek();
}

function getMondayOf(d){const day=d.getDay();const diff=d.getDate()-(day===0?6:day-1);return new Date(d.getFullYear(),d.getMonth(),diff);}
function dateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function changeWeek(dir){anchorMonday=new Date(anchorMonday.getFullYear(),anchorMonday.getMonth(),anchorMonday.getDate()+dir*7);renderWeek();}
function goToday(){anchorMonday=getMondayOf(new Date());renderWeek();}
function toggleEdit(){
  editMode=!editMode;
  document.getElementById('edit-btn').classList.toggle('active',editMode);
  document.getElementById('edit-lbl').textContent=editMode?'Concluir':'Editar';
  document.getElementById('edit-hint-bar').style.display=editMode?'block':'none';
  renderWeek();
}

function renderWeek(){
  const end=new Date(anchorMonday.getFullYear(),anchorMonday.getMonth(),anchorMonday.getDate()+6);
  const sM=MONTHS[anchorMonday.getMonth()].substring(0,3);
  const eM=MONTHS[end.getMonth()].substring(0,3);
  document.getElementById('week-label').textContent=
    anchorMonday.getMonth()===end.getMonth()
    ?`${anchorMonday.getDate()} — ${end.getDate()} de ${sM} ${end.getFullYear()}`
    :`${anchorMonday.getDate()} ${sM} — ${end.getDate()} ${eM} ${end.getFullYear()}`;

  const grid=document.getElementById('week-grid');
  grid.innerHTML='';
  const todayStr=dateStr(new Date());

  for(let i=0;i<7;i++){
    const d=new Date(anchorMonday.getFullYear(),anchorMonday.getMonth(),anchorMonday.getDate()+i);
    const ds=dateStr(d);
    const col=document.createElement('div');
    col.className='day-col'+(ds===todayStr?' today':'')+(editMode?' edit-active':'');

    const evs=EVENTS.filter(e=>e.date===ds);
    let evHtml='';
    evs.forEach(e=>{
      const prods=e.products||[];
      const opt=prods.length===1?PRODUCT_OPTIONS.find(o=>o.key===prods[0]):null;
      const bgColor=opt?opt.bg:'rgba(201,168,76,0.07)';
      const borderColor=opt?opt.color:'#7A6030';
      const textColor=opt?opt.color:'#E8D5A3';
      const rm=editMode?`<span class="ev-rm" style="color:${textColor}" onclick="removeEv(event,'${e.id}')">×</span>`:'';
      const tags=prods.length>1
        ?`<div class="ev-tags">${prods.map(pk=>{const o=PRODUCT_OPTIONS.find(x=>x.key===pk);return o?`<span class="ev-tag" style="background:${o.bg};color:${o.color}">${o.label}</span>`:''}).join('')}</div>`
        :'';
      evHtml+=`<div class="cal-event" style="background:${bgColor};border-left:3px solid ${borderColor};color:${textColor}">
        <div><div>${e.label}</div>${tags}</div>${rm}</div>`;
    });

    col.innerHTML=`<div class="day-header"><div class="day-name">${DAYS_SHORT[d.getDay()]}</div><div class="day-num">${d.getDate()}</div></div><div class="day-events">${evHtml}</div>`;
    if(editMode)col.addEventListener('click',()=>openAdd(ds,d));
    grid.appendChild(col);
  }

  // legenda com mesmas cores dos eventos
  document.getElementById('cal-legend').innerHTML=PRODUCT_OPTIONS.map(o=>`
    <div class="leg-item">
      <div class="leg-dot" style="background:${o.color}"></div>
      <span class="leg-name">${o.label}</span>
    </div>`).join('');
}

function openAdd(ds,d){
  addTarget=ds;
  document.getElementById('add-date-lbl').textContent=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  document.getElementById('ev-label').value='';
  document.getElementById('checklist').innerHTML=PRODUCT_OPTIONS.map(o=>`
    <div class="check-item" data-key="${o.key}" onclick="toggleCheck(this)">
      <div class="check-box"></div>
      <div class="check-dot" style="background:${o.color}"></div>
      <span class="check-label">${o.label}</span>
    </div>`).join('');
  document.getElementById('add-modal').classList.add('open');
}
function closeAdd(){document.getElementById('add-modal').classList.remove('open');addTarget=null;}

function toggleCheck(el){
  if(el.dataset.key==='all'){const will=!el.classList.contains('checked');document.querySelectorAll('#checklist .check-item').forEach(ci=>ci.classList.remove('checked'));if(will)el.classList.add('checked');}
  else{document.querySelectorAll('#checklist .check-item[data-key="all"]').forEach(ci=>ci.classList.remove('checked'));el.classList.toggle('checked');}
  document.querySelectorAll('#checklist .check-item.checked .check-box').forEach(b=>b.textContent='✓');
  document.querySelectorAll('#checklist .check-item:not(.checked) .check-box').forEach(b=>b.textContent='');
}

async function confirmAdd(){
  const label=document.getElementById('ev-label').value.trim();
  const products=[...document.querySelectorAll('#checklist .check-item.checked')].map(el=>el.dataset.key);
  if(!label||!addTarget)return;
  if(!products.length){alert('Selecione ao menos um produto.');return;}
  const{data,error}=await sb.from('events').insert({date:addTarget,label,products}).select().single();
  if(!error){EVENTS.push(data);}
  closeAdd();renderWeek();
}

async function removeEv(e,id){
  e.stopPropagation();
  await sb.from('events').delete().eq('id',id);
  EVENTS=EVENTS.filter(ev=>ev.id!==id);
  renderWeek();
}

// PRODUTOS
function renderProducts(){
  const grid=document.getElementById('prod-grid');
  grid.innerHTML='';
  PRODUCTS.forEach(p=>{
    const f=p.ficha||{};
    // pega cor do PRODUCT_OPTIONS pelo prodKey, senão usa a cor salva no registro
    const opt=PRODUCT_OPTIONS.find(o=>o.key===p.id)||PRODUCT_OPTIONS.find(o=>o.key==='all');
    const color=p.color||opt.color;
    const bg=p.badge_border?p.badge_border.replace('0.5)','0.14)'):opt.bg;
    const el=document.createElement('div');
    el.className='prod-card';
    el.style.cssText=`border-color:${color}22`;
    el.innerHTML=`
      <div class="prod-badge" style="background:${bg};color:${color}">
        <div class="prod-badge-dot" style="background:${color}"></div>${p.badge}
      </div>
      <div class="prod-name">${p.name}</div>
      <div class="prod-tagline">${p.tagline}</div>
      <div class="prod-price">${f.precoIntegral||'—'}</div>
      <div class="prod-price-label">${f.frequencia||''}</div>
      <div class="prod-arrow" style="color:${color}88"><i class="ti ti-arrow-up-right"></i></div>`;
    el.addEventListener('mouseenter',()=>el.style.borderColor=color+'55');
    el.addEventListener('mouseleave',()=>el.style.borderColor=color+'22');
    el.onclick=()=>openProduct(p.id);
    grid.appendChild(el);
  });
}

function openProduct(id){
  currentProdId=id;
  const p=PRODUCTS.find(x=>x.id===id);
  if(p){renderFicha(p,false);document.getElementById('prod-modal').classList.add('open');}
}
function closeProd(){document.getElementById('prod-modal').classList.remove('open');currentProdId=null;}

function renderFicha(p,editing){
  const f=p.ficha||{};
  const opt=PRODUCT_OPTIONS.find(o=>o.key===p.id)||PRODUCT_OPTIONS.find(o=>o.key==='all');
  const color=p.color||opt.color;
  const bg=opt.bg;

  const sectionsHtml=FICHA_SECTIONS.map(s=>{
    const fields=s.fields.map(field=>{
      const val=f[field.key]||'';
      const edAttr=editing?'contenteditable="true"':'';
      const cls='ficha-value'+(editing?' editable':'')+(val?'':' empty');
      return `<div class="ficha-field"><div class="ficha-label">${field.label}</div><div class="${cls}" data-key="${field.key}" ${edAttr}>${val||(editing?'':'—')}</div></div>`;
    }).join('');
    return `<div class="ficha-section"><div class="ficha-section-title">${s.title}</div><div class="ficha-grid${s.fields.length===1?' full':''}">${fields}</div></div>`;
  }).join('');

  const bar=editing
    ?`<div class="edit-bar active"><span><i class="ti ti-pencil" style="vertical-align:-2px;margin-right:6px"></i>Editando</span><div class="edit-bar-btns"><span class="save-status" id="save-status"></span><button class="btn-sm" onclick="cancelEdit()">Cancelar</button><button class="btn-sm primary" onclick="saveEdit('${p.id}')">Salvar</button></div></div>`
    :`<div class="edit-bar"><span>Ficha do produto</span><div class="edit-bar-btns"><button class="btn-sm" onclick="startEdit('${p.id}')"><i class="ti ti-pencil" style="font-size:12px;vertical-align:-2px;margin-right:4px"></i>Editar</button></div></div>`;

  document.getElementById('modal-body').innerHTML=`
    <div class="ficha-header">
      <div class="ficha-badge" style="background:${bg};color:${color}"><div class="ficha-badge-dot" style="background:${color}"></div>${p.badge}</div>
      <div class="ficha-name">${p.name}</div>
      <div class="ficha-tagline-el">${p.tagline}</div>
    </div>${bar}${sectionsHtml}`;
}

function startEdit(id){const p=PRODUCTS.find(x=>x.id===id);if(p)renderFicha(p,true);}
function cancelEdit(){const p=PRODUCTS.find(x=>x.id===currentProdId);if(p)renderFicha(p,false);}

async function saveEdit(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return;
  const st=document.getElementById('save-status');
  if(st)st.textContent='Salvando...';
  const updatedFicha={...(p.ficha||{})};
  document.querySelectorAll('.ficha-value[data-key]').forEach(el=>{updatedFicha[el.dataset.key]=el.textContent.trim();});
  const{error}=await sb.from('products').update({ficha:updatedFicha,updated_at:new Date().toISOString()}).eq('id',id);
  if(!error){p.ficha=updatedFicha;renderFicha(p,false);renderProducts();}
  else if(st)st.textContent='Erro ao salvar.';
}

function switchTab(tab,btn){
  ['calendario','produtos','time','acessos'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});

function renderAcessos(){
  const container=document.getElementById('acessos-grid');
  container.innerHTML='';
  ACESSOS.forEach(a=>{
    const el=document.createElement('div');
    el.className='acesso-card';
    el.innerHTML=`
      <div class="acesso-header">
        <div class="acesso-nome">${a.plataforma}</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${a.url?`<a class="acesso-icon-btn" href="${a.url}" target="_blank" title="Abrir"><i class="ti ti-external-link"></i></a>`:''}
          <button class="acesso-icon-btn" onclick="openEditAcesso('${a.id}')" title="Editar"><i class="ti ti-pencil"></i></button>
        </div>
      </div>
      ${a.url?`<div class="acesso-row">
        <span class="acesso-label">URL</span>
        <span class="acesso-val acesso-url">${a.url}</span>
        <button class="copy-btn" onclick="copyText(this,'${escQ(a.url)}')" title="Copiar URL"><i class="ti ti-copy"></i></button>
      </div>`:''}
      <div class="acesso-row">
        <span class="acesso-label">Login</span>
        <span class="acesso-val">${a.login}</span>
        <button class="copy-btn" onclick="copyText(this,'${escQ(a.login)}')" title="Copiar login"><i class="ti ti-copy"></i></button>
      </div>
      <div class="acesso-row">
        <span class="acesso-label">Senha</span>
        <span class="acesso-val acesso-senha" data-raw="${escQ(a.senha)}" data-show="false">${maskSenha(a.senha)}</span>
        <button class="copy-btn toggle-senha-btn" onclick="toggleSenha(this)" title="Mostrar/ocultar"><i class="ti ti-eye"></i></button>
        <button class="copy-btn" onclick="copyText(this,'${escQ(a.senha)}')" title="Copiar senha"><i class="ti ti-copy"></i></button>
      </div>
      ${a.obs?`<div class="acesso-obs"><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:5px"></i>${a.obs}</div>`:''}
    `;
    container.appendChild(el);
  });
}

function maskSenha(s){return '•'.repeat(Math.min(s.length,14));}
function escQ(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function toggleSenha(btn){
  const row=btn.closest('.acesso-row');
  const el=row.querySelector('.acesso-senha');
  const showing=el.dataset.show==='true';
  el.textContent=showing?maskSenha(el.dataset.raw):el.dataset.raw;
  el.dataset.show=showing?'false':'true';
  btn.innerHTML=showing?'<i class="ti ti-eye"></i>':'<i class="ti ti-eye-off"></i>';
}

function copyText(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.innerHTML;
    btn.innerHTML='<i class="ti ti-check"></i>';
    btn.style.color='var(--gold)';
    setTimeout(()=>{btn.innerHTML=orig;btn.style.color='';},1500);
  });
}

// MODAL ACESSO — editar / novo
let editingAcessoId=null;

function openEditAcesso(id){
  editingAcessoId=id||null;
  const a=id?ACESSOS.find(x=>x.id===id):{id:'',plataforma:'',url:'',login:'',senha:'',obs:''};
  document.getElementById('acesso-modal-title').textContent=id?'Editar acesso':'Novo acesso';
  document.getElementById('acesso-delete-btn').style.display=id?'block':'none';
  document.getElementById('af-plataforma').value=a.plataforma||'';
  document.getElementById('af-url').value=a.url||'';
  document.getElementById('af-login').value=a.login||'';
  document.getElementById('af-senha').value=a.senha||'';
  document.getElementById('af-obs').value=a.obs||'';
  document.getElementById('acesso-modal').classList.add('open');
}
function closeAcessoModal(){document.getElementById('acesso-modal').classList.remove('open');editingAcessoId=null;}

function saveAcesso(){
  const plataforma=document.getElementById('af-plataforma').value.trim();
  if(!plataforma){alert('Nome da plataforma é obrigatório.');return;}
  const data={
    id:editingAcessoId||('a'+Date.now()),
    plataforma,
    url:document.getElementById('af-url').value.trim(),
    login:document.getElementById('af-login').value.trim(),
    senha:document.getElementById('af-senha').value.trim(),
    obs:document.getElementById('af-obs').value.trim(),
  };
  if(editingAcessoId){
    const idx=ACESSOS.findIndex(x=>x.id===editingAcessoId);
    if(idx>-1)ACESSOS[idx]=data;
  } else {
    ACESSOS.push(data);
  }
  closeAcessoModal();
  renderAcessos();
}

function deleteAcesso(){
  if(!editingAcessoId)return;
  if(!confirm('Remover este acesso?'))return;
  ACESSOS=ACESSOS.filter(x=>x.id!==editingAcessoId);
  closeAcessoModal();
  renderAcessos();
}
