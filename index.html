<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dra. Vivian Amaral — Central de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8D5A3;--gold-dim:#7A6030;
  --dark:#111010;--dark2:#1A1918;--dark3:#222120;--dark4:#2C2B2A;
  --text:#F0EBE0;--text-muted:#9A9188;
  --border:rgba(201,168,76,0.18);--border-hover:rgba(201,168,76,0.45);
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Jost',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark)}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

/* LOGIN */
#login-screen{display:none;position:fixed;inset:0;background:var(--dark);z-index:900;align-items:center;justify-content:center}
.login-box{width:min(380px,94vw);padding:40px 36px;background:var(--dark2);border:0.5px solid var(--border);border-radius:3px}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-monogram{width:44px;height:44px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);font-weight:300}
.login-brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text);letter-spacing:2px}
.login-brand-sub{font-size:10px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.login-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--gold-light);margin-bottom:24px;text-align:center}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px}
.login-field input{width:100%;background:var(--dark3);border:0.5px solid var(--border);color:var(--text);font-family:'Jost',sans-serif;font-size:16px;padding:10px 12px;border-radius:2px;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:var(--gold-dim)}
.login-btn{width:100%;background:var(--gold-dim);border:none;color:var(--dark);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:12px;border-radius:2px;cursor:pointer;transition:background .2s;margin-top:8px}
.login-btn:hover{background:var(--gold)}
.login-error{font-size:12px;color:#C0463A;margin-top:12px;text-align:center;min-height:18px}

/* APP */
#app{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:0.5px solid var(--border);background:var(--dark);position:sticky;top:0;z-index:50;gap:16px}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.brand-monogram{width:38px;height:38px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold);font-weight:300}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text);letter-spacing:2px}
.brand-sub{font-size:11px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.nav{display:flex;gap:4px}
.nav-btn{background:none;border:none;padding:8px 16px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:color .2s;position:relative}
.nav-btn:hover{color:var(--gold)}
.nav-btn.active{color:var(--gold)}
.nav-btn.active::after{content:'';position:absolute;bottom:-17px;left:0;right:0;height:1px;background:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.user-badge{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.user-nivel{font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:2px 7px;border-radius:1px;border:0.5px solid}
.nivel-adm{color:var(--gold);border-color:var(--gold-dim)}
.nivel-equipe{color:var(--text-muted);border-color:var(--border)}
.logout-btn{background:none;border:0.5px solid var(--border);color:var(--text-muted);padding:0 12px;height:28px;border-radius:2px;cursor:pointer;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.logout-btn:hover{border-color:var(--gold-dim);color:var(--text)}
.hamburger{display:none;background:none;border:0.5px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:2px;cursor:pointer;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* DRAWER MOBILE */
.mobile-drawer{position:fixed;top:0;left:0;bottom:0;width:min(300px,85vw);background:var(--dark2);border-right:0.5px solid var(--border);z-index:800;transform:translateX(-100%);transition:transform .28s ease;display:flex;flex-direction:column}
.mobile-drawer.open{transform:translateX(0)}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:799;display:none}
.drawer-overlay.open{display:block}
.mobile-drawer-top{display:flex;align-items:center;justify-content:space-between;padding:24px 18px 18px;border-bottom:0.5px solid var(--border)}
.mobile-user-info{display:flex;align-items:center;gap:12px}
.mobile-monogram{width:42px;height:42px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold);font-weight:300;flex-shrink:0}
.mobile-user-nome{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text);font-weight:300}
.mobile-user-nivel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:2px}
.mobile-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:4px}
.mobile-nav{display:flex;flex-direction:column;gap:2px;padding:14px 10px;flex:1}
.mobile-nav-btn{background:none;border:none;padding:15px 14px;font-family:'Jost',sans-serif;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-radius:2px;text-align:left;transition:all .2s;display:flex;align-items:center;gap:12px}
.mobile-nav-btn:hover,.mobile-nav-btn.active{background:rgba(201,168,76,0.07);color:var(--gold)}
.mobile-nav-btn i{font-size:20px;flex-shrink:0}
.mobile-logout{margin:0 10px 20px;background:none;border:0.5px solid var(--border);color:var(--text-muted);padding:14px;border-radius:2px;cursor:pointer;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.mobile-logout:hover{border-color:var(--gold-dim);color:var(--text)}

/* CONTENT */
.content{padding:28px;min-height:calc(100vh - 70px)}
.icon-btn{background:none;border:0.5px solid var(--border);color:var(--text-muted);padding:0 14px;height:30px;border-radius:2px;cursor:pointer;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.icon-btn:hover,.icon-btn.active{border-color:var(--gold);color:var(--gold)}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold-light);letter-spacing:1px}

/* CALENDÁRIO */
.week-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.week-nav{display:flex;align-items:center;gap:10px}
.wnav-btn{background:none;border:0.5px solid var(--border);color:var(--text-muted);width:34px;height:34px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.wnav-btn:hover{border-color:var(--gold);color:var(--gold)}
.week-label{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--gold-light);letter-spacing:1px;min-width:220px;text-align:center}
.edit-hint-bar{display:none;font-size:13px;color:var(--gold-dim);margin-bottom:16px;padding:9px 13px;border:0.5px dashed var(--gold-dim);border-radius:2px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-col{background:var(--dark2);border:0.5px solid var(--border);border-radius:3px;overflow:hidden;min-height:130px;display:flex;flex-direction:column;transition:border-color .2s}
.day-col.today{border-color:var(--gold)}
.day-col.edit-active{cursor:pointer}
.day-col.edit-active:hover{border-color:var(--gold-dim)}
.day-header{padding:10px 8px 8px;border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.day-name{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.day-num{font-size:30px;font-family:'Cormorant Garamond',serif;font-weight:300;color:var(--text-muted);line-height:1}
.day-col.today .day-num,.day-col.today .day-name{color:var(--gold)}
.day-events{padding:7px 6px;display:flex;flex-direction:column;gap:4px;flex:1}
.cal-event{font-size:12px;padding:5px 8px;border-radius:2px;line-height:1.4;display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
.ev-rm{opacity:.35;cursor:pointer;font-size:13px;flex-shrink:0;line-height:1;margin-top:1px}
.ev-rm:hover{opacity:1;color:#fff}
.ev-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.ev-tag{font-size:9px;padding:1px 5px;border-radius:1px}
.ev-links{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.ev-links a{font-size:10px;letter-spacing:.5px;padding:2px 7px;border-radius:1px;border:0.5px solid currentColor;opacity:.7;text-decoration:none;color:inherit;display:inline-flex;align-items:center;gap:4px;transition:opacity .2s}
.ev-links a:hover{opacity:1}
.cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px;padding:14px 16px;background:var(--dark2);border:0.5px solid var(--border);border-radius:3px}
.leg-item{display:flex;align-items:center;gap:8px}
.leg-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.leg-name{font-size:13px;color:var(--text)}

/* PRODUTOS */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.prod-card{background:var(--dark2);border:0.5px solid var(--border);border-radius:3px;padding:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.prod-card:hover{transform:translateY(-2px)}
.prod-badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:2px;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;font-weight:500}
.prod-badge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.prod-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text);margin-bottom:6px;line-height:1.2}
.prod-tagline{font-size:12px;color:var(--text-muted);line-height:1.5}
.prod-price{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold-light);font-weight:300;margin-top:12px}
.prod-price-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.prod-arrow{position:absolute;bottom:14px;right:14px;font-size:16px;transition:all .2s}
.prod-card:hover .prod-arrow{transform:translate(2px,-2px)}

/* FICHA */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--dark2);border:0.5px solid var(--border-hover);border-radius:3px;width:min(720px,96vw);max-height:88vh;overflow-y:auto;padding:30px;position:relative}
.mclose{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;transition:color .2s}
.mclose:hover{color:var(--gold)}
.ficha-badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:2px;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;font-weight:500}
.ficha-badge-dot{width:8px;height:8px;border-radius:50%}
.ficha-name{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--text);line-height:1.1;margin-bottom:4px}
.ficha-tagline-el{font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:22px}
.ficha-section{margin-bottom:24px}
.ficha-section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);padding-bottom:8px;border-bottom:0.5px solid var(--border);margin-bottom:12px}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ficha-grid.full{grid-template-columns:1fr}
.ficha-field{display:flex;flex-direction:column;gap:5px}
.ficha-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted)}
.ficha-value{font-size:13px;color:var(--text);line-height:1.5;min-height:34px;padding:7px 9px;background:var(--dark3);border:0.5px solid var(--border);border-radius:2px;transition:border-color .2s;white-space:pre-wrap;word-break:break-word}
.ficha-value.editable:hover{border-color:var(--border-hover);cursor:text}
.ficha-value[contenteditable="true"]{outline:none;border-color:var(--gold-dim);cursor:text}
.ficha-value.empty{color:var(--dark4);font-style:italic}
.edit-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:9px 13px;border:0.5px solid var(--border);border-radius:2px}
.edit-bar.active{background:rgba(201,168,76,0.06);border-color:var(--gold-dim)}
.edit-bar span{font-size:12px;color:var(--text-muted)}
.edit-bar.active span{color:var(--gold-dim)}
.edit-bar-btns{display:flex;gap:8px;align-items:center}
.btn-sm{background:none;border:0.5px solid var(--border);color:var(--text-muted);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:2px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--gold-dim);color:var(--text)}
.btn-sm.primary{background:var(--gold-dim);border-color:var(--gold-dim);color:var(--dark)}
.btn-sm.primary:hover{background:var(--gold)}

/* ADD MODAL */
.add-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center}
.add-modal.open{display:flex}
.add-box{background:var(--dark2);border:0.5px solid var(--border-hover);border-radius:3px;width:min(420px,94vw);padding:26px;position:relative;max-height:92vh;overflow-y:auto}
.add-box h3{font-family:'Cormorant Garamond',serif;font-size:23px;color:var(--gold-light);font-weight:300;margin-bottom:4px}
.add-date-lbl{font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:18px}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.field input,.field select{width:100%;background:var(--dark3);border:0.5px solid var(--border);color:var(--text);font-family:'Jost',sans-serif;font-size:16px;padding:9px 11px;border-radius:2px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--gold-dim)}
.field select option{background:var(--dark3)}
.checklist{display:flex;flex-direction:column;gap:6px}
.check-item{display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 11px;border:0.5px solid var(--border);border-radius:2px;transition:border-color .2s;user-select:none}
.check-item:hover{border-color:var(--border-hover)}
.check-item.checked{border-color:var(--gold-dim)}
.check-box{width:17px;height:17px;border:0.5px solid var(--border);border-radius:1px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--dark);transition:all .2s}
.check-item.checked .check-box{background:var(--gold-dim);border-color:var(--gold-dim)}
.check-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.check-label{font-size:13px;color:var(--text-muted)}
.check-item.checked .check-label{color:var(--text)}
.add-actions{display:flex;gap:8px;margin-top:18px}
.btn-primary{flex:1;background:var(--gold-dim);border:none;color:var(--dark);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:11px;border-radius:2px;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:var(--gold)}
.btn-cancel{background:none;border:0.5px solid var(--border);color:var(--text-muted);font-family:'Jost',sans-serif;font-size:12px;padding:11px 16px;border-radius:2px;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:var(--gold-dim);color:var(--text)}
.btn-danger{background:none;border:0.5px solid rgba(192,70,58,0.4);color:#C0463A;font-family:'Jost',sans-serif;font-size:12px;padding:11px 16px;border-radius:2px;cursor:pointer;transition:all .2s}
.btn-danger:hover{background:rgba(192,70,58,0.1)}
.mclose-sm{position:absolute;top:13px;right:13px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;transition:color .2s}
.mclose-sm:hover{color:var(--gold)}

/* TIME */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.team-card{background:var(--dark2);border:0.5px solid var(--border);border-radius:3px;padding:22px;transition:border-color .2s}
.team-card:hover{border-color:var(--border-hover)}
.team-avatar{width:48px;height:48px;border-radius:50%;background:var(--dark4);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);margin-bottom:14px}
.team-name{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--text);margin-bottom:2px}
.team-role{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:12px}
.team-resp{list-style:none;display:flex;flex-direction:column;gap:6px}
.team-resp li{font-size:12px;color:var(--text-muted);display:flex;gap:8px;line-height:1.4}
.team-resp li::before{content:'—';color:var(--gold-dim);flex-shrink:0}
.team-add{background:none;border:0.5px dashed var(--gold-dim);border-radius:3px;padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:var(--gold-dim);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;min-height:180px;width:100%}
.team-add:hover{border-color:var(--gold);color:var(--gold)}
.team-add i{font-size:24px}

/* ACESSOS */
.acessos-list{display:flex;flex-direction:column;border:0.5px solid var(--border);border-radius:3px;overflow:hidden}
.acesso-row-item{display:grid;grid-template-columns:150px 1fr 1fr 1fr 76px;align-items:center;border-bottom:0.5px solid var(--border);transition:background .15s}
.acesso-row-item:last-child{border-bottom:none}
.acesso-row-item:hover{background:rgba(201,168,76,0.03)}
.acesso-row-item.list-header{background:var(--dark3)}
.acesso-cell{padding:10px 13px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px;min-width:0;border-right:0.5px solid var(--border)}
.acesso-cell:last-child{border-right:none}
.acesso-cell.header{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.acesso-cell-nome{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--gold-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acesso-cell-val{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}
.acesso-cell-senha-val{letter-spacing:.5px}
.acesso-cell-actions{display:flex;gap:5px;justify-content:flex-end}
.acesso-icon-btn{background:none;border:0.5px solid var(--border);color:var(--text-muted);width:28px;height:28px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;text-decoration:none;transition:all .2s;flex-shrink:0}
.acesso-icon-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.copy-btn{background:none;border:0.5px solid var(--border);color:var(--text-muted);width:28px;height:28px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0}

<script>
const SB_URL='https://zcfpurlpebhymlayrohn.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjZnB1cmxwZWJoeW1sYXlyb2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2Njg2ODgsImV4cCI6MjA5NjI0NDY4OH0.PTMAtd8uzU7SxMNBsfdVpE95Kr4ZHTb39XXprNhjIko';
const sb=supabase.createClient(SB_URL,SB_KEY);

const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const PROD_OPTS=[
  {key:'mentoria', label:'Mentoria ÍntimaPro', color:'#C9A84C', bg:'rgba(201,168,76,0.14)'},
  {key:'posgrad',  label:'Pós Graduação',      color:'#5B82E8', bg:'rgba(91,130,232,0.14)'},
  {key:'master',   label:'Master Leggacy',     color:'#C0463A', bg:'rgba(192,70,58,0.14)'},
  {key:'aberto',   label:'Público Aberto',     color:'#3DA882', bg:'rgba(61,168,130,0.14)'},
  {key:'thunder',  label:'Thunder Legacy',     color:'#9B6BE0', bg:'rgba(155,107,224,0.14)'},
  {key:'all',      label:'Todos',              color:'#888077', bg:'rgba(136,128,119,0.16)'},
];
const FICHA_SEC=[
  {title:'01 — Identidade',fields:[{key:'status',label:'Status'},{key:'publicoAlvo',label:'Público-alvo'},{key:'problema',label:'Problema que resolve'},{key:'promessa',label:'Promessa principal'},{key:'frequencia',label:'Frequência'},{key:'modeloContratacao',label:'Modelo de contratação'}]},
  {title:'02 — Apresentação',fields:[{key:'linkApresentacao',label:'Link da apresentação'},{key:'linkVSL',label:'VSL'},{key:'linkPaginaVendas',label:'Página de vendas'}]},
  {title:'03 — Pagamento',fields:[{key:'precoIntegral',label:'Preço integral'},{key:'precoMentoria',label:'Preço alunos Mentoria'},{key:'formaPagamento',label:'Formas de pagamento'},{key:'linkPagamento',label:'Link de pagamento'}]},
  {title:'04 — Bônus',fields:[{key:'bonusFixo',label:'Bônus fixo'},{key:'bonusFechamento',label:'Bônus de fechamento'}]},
  {title:'05 — Entrega',fields:[{key:'oQueIncluso',label:'O que está incluso'},{key:'linksGrupos',label:'Links dos grupos'},{key:'politicaCancelamento',label:'Política de cancelamento'}]},
  {title:'06 — Observações',fields:[{key:'observacoes',label:'Observações'}]},
];
const TABS_ADM=['calendario','produtos','time','acessos','usuarios'];
const TABS_EQ=['calendario','produtos'];
const TAB_LABELS={calendario:'Calendário',produtos:'Produtos',time:'Time',acessos:'Acessos',usuarios:'Usuários'};
const TAB_ICONS={calendario:'ti-calendar',produtos:'ti-package',time:'ti-users',acessos:'ti-lock',usuarios:'ti-user-circle'};

let EVENTS=[],PRODUCTS=[],USUARIOS=[];
let currentUser=null,currentNivel=null;
let anchorMonday=getMondayOf(new Date()),editMode=false,addTarget=null,currentProdId=null;
let editingAcessoId=null,editingUsuarioId=null;
let ACESSOS=[];

// ── AUTH ──
function showLogin(){
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-nome').textContent=currentUser.nome||'';
  const nb=document.getElementById('user-nivel-badge');
  nb.textContent=currentNivel==='adm'?'ADM':'EQUIPE';
  nb.className='user-nivel nivel-'+(currentNivel==='adm'?'adm':'equipe');
  document.getElementById('m-nome').textContent=currentUser.nome||'';
  document.getElementById('m-nivel').textContent=currentNivel==='adm'?'Administrativo':'Equipe';
  buildNav();
  renderWeek();
}

window.addEventListener('load',async()=>{
  try{
    const saved=localStorage.getItem('va_user');
    if(saved){
      currentUser=JSON.parse(saved);
      currentNivel=currentUser.nivel;
      const[evR,prR,acR]=await Promise.all([
        sb.from('events').select('*').order('date'),
        sb.from('products').select('*'),
        sb.from('acessos').select('*').order('created_at'),
      ]);
      EVENTS=evR.data||[];
      PRODUCTS=prR.data||[];
      ACESSOS=acR.data||[];
      showApp();
    } else {
      showLogin();
    }
  }catch(e){
    console.error(e);
    showLogin();
  }
});

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const senha=document.getElementById('login-senha').value;
  document.getElementById('login-error').textContent='';
  try{
    const{data,error}=await sb.from('usuarios').select('*').eq('email',email).eq('senha',senha).single();
    if(error||!data){document.getElementById('login-error').textContent='E-mail ou senha incorretos.';return;}
    currentUser=data;currentNivel=data.nivel;
    localStorage.setItem('va_user',JSON.stringify(data));
    const[evR,prR,acR]=await Promise.all([
      sb.from('events').select('*').order('date'),
      sb.from('products').select('*'),
      sb.from('acessos').select('*').order('created_at'),
    ]);
    EVENTS=evR.data||[];PRODUCTS=prR.data||[];ACESSOS=acR.data||[];
    showApp();
  }catch(e){
    document.getElementById('login-error').textContent='Erro de conexão.';
  }
}

function doLogout(){
  localStorage.removeItem('va_user');
  currentUser=null;currentNivel=null;
  showLogin();
}

// ── NAV ──
function buildNav(){
  const tabs=currentNivel==='adm'?TABS_ADM:TABS_EQ;
  const nav=document.getElementById('main-nav');
  nav.innerHTML='';
  const mnav=document.getElementById('mobile-nav');
  mnav.innerHTML='';
  tabs.forEach((tab,i)=>{
    const b=document.createElement('button');
    b.className='nav-btn'+(i===0?' active':'');
    b.textContent=TAB_LABELS[tab];
    b.onclick=()=>switchTab(tab);
    nav.appendChild(b);
    const mb=document.createElement('button');
    mb.className='mobile-nav-btn'+(i===0?' active':'');
    mb.dataset.tab=tab;
    mb.innerHTML=`<i class="ti ${TAB_ICONS[tab]}"></i>${TAB_LABELS[tab]}`;
    mb.onclick=()=>{switchTab(tab);toggleDrawer();};
    mnav.appendChild(mb);
  });
  const allTabs=['calendario','produtos','time','acessos','usuarios'];
  allTabs.forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el)el.style.display=t===tabs[0]?'block':'none';
  });
}

function switchTab(tab){
  const tabs=currentNivel==='adm'?TABS_ADM:TABS_EQ;
  if(!tabs.includes(tab))return;
  ['calendario','produtos','time','acessos','usuarios'].forEach(t=>{
    const el=document.getElementById('tab-'+t);if(el)el.style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{b.classList.toggle('active',tabs[i]===tab);});
  document.querySelectorAll('.mobile-nav-btn').forEach(b=>{b.classList.toggle('active',b.dataset.tab===tab);});
  if(tab==='calendario')renderWeek();
  if(tab==='produtos')renderProducts();
  if(tab==='time')renderTeam();
  if(tab==='acessos')renderAcessos();
  if(tab==='usuarios')renderUsuarios();
}

function toggleDrawer(){
  document.getElementById('mobile-drawer').classList.toggle('open');
  document.getElementById('drawer-overlay').classList.toggle('open');
}

// ── CALENDÁRIO ──
function getMondayOf(d){const day=d.getDay();return new Date(d.getFullYear(),d.getMonth(),d.getDate()-(day===0?6:day-1));}
function dStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function changeWeek(dir){anchorMonday=new Date(anchorMonday.getFullYear(),anchorMonday.getMonth(),anchorMonday.getDate()+dir*7);renderWeek();}
function goToday(){anchorMonday=getMondayOf(new Date());renderWeek();}
function toggleEdit(){
  editMode=!editMode;
  document.getElementById('edit-btn').classList.toggle('active',editMode);
  document.getElementById('edit-lbl').textContent=editMode?'Concluir':'Editar';
  document.getElementById('edit-hint-bar').style.display=editMode?'block':'none';
  renderWeek();
}
function renderWeek(){
  const end=new Date(anchorMonday.getFullYear(),anchorMonday.getMonth(),anchorMonday.getDate()+6);
  const sM=MONTHS[anchorMonday.getMonth()].substring(0,3),eM=MONTHS[end.getMonth()].substring(0,3);
  document.getElementById('week-label').textContent=
    anchorMonday.getMonth()===end.getMonth()
    ?`${anchorMonday.getDate()} — ${end.getDate()} de ${sM} ${end.getFullYear()}`
    :`${anchorMonday.getDate()} ${sM} — ${end.getDate()} ${eM} ${end.getFullYear()}`;
  const grid=document.getElementById('week-grid');grid.innerHTML='';
  const todayStr=dStr(new Date());
  for(let i=0;i<7;i++){
    const d=new Date(anchorMonday.getFullYear(),anchorMonday.getMonth(),anchorMonday.getDate()+i);
    const ds=dStr(d);
    const col=document.createElement('div');
    col.className='day-col'+(ds===todayStr?' today':'')+(editMode?' edit-active':'');
    const evs=EVENTS.filter(e=>e.date===ds);
    let evHtml='';
    evs.forEach(e=>{
      const pr=e.products||[];
      const opt=pr.length===1?PROD_OPTS.find(o=>o.key===pr[0]):null;
      const bg=opt?opt.bg:'rgba(201,168,76,0.07)',bc=opt?opt.color:'#7A6030',tc=opt?opt.color:'#E8D5A3';
      const rm=editMode?`<span class="ev-rm" style="color:${tc}" onclick="removeEv(event,'${e.id}')">×</span>`:'';
      const tags=pr.length>1?`<div class="ev-tags">${pr.map(pk=>{const o=PROD_OPTS.find(x=>x.key===pk);return o?`<span class="ev-tag" style="background:${o.bg};color:${o.color}">${o.label}</span>`:''}).join('')}</div>`:'';
      const CALL_LINKS=`<div class="ev-links"><a href="https://meet.google.com/oqg-tdre-xiy?authuser=1" target="_blank" onclick="event.stopPropagation()"><i class="ti ti-video"></i>Meet</a><a href="https://docs.google.com/document/d/13vmCojSZcjyvto8hKdiAn-ZzIuB1WqJbt-j3ZNAedqM/edit?usp=sharing" target="_blank" onclick="event.stopPropagation()"><i class="ti ti-file-text"></i>Pauta</a></div>`;
      const isCall=e.label.startsWith('Call interna');
      evHtml+=`<div class="cal-event" style="background:${bg};border-left:3px solid ${bc};color:${tc}"><div><div>${e.label}</div>${tags}${isCall?CALL_LINKS:''}</div>${rm}</div>`;
    });
    col.innerHTML=`<div class="day-header"><div class="day-name">${DAYS[d.getDay()]}</div><div class="day-num">${d.getDate()}</div></div><div class="day-events">${evHtml}</div>`;
    if(editMode)col.addEventListener('click',()=>openAdd(ds,d));
    grid.appendChild(col);
  }
  document.getElementById('cal-legend').innerHTML=PROD_OPTS.map(o=>`<div class="leg-item"><div class="leg-dot" style="background:${o.color}"></div><span class="leg-name">${o.label}</span></div>`).join('');
}
function openAdd(ds,d){
  addTarget=ds;
  document.getElementById('add-date-lbl').textContent=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  document.getElementById('ev-label').value='';
  document.getElementById('checklist').innerHTML=PROD_OPTS.map(o=>`<div class="check-item" data-key="${o.key}" onclick="toggleCheck(this)"><div class="check-box"></div><div class="check-dot" style="background:${o.color}"></div><span class="check-label">${o.label}</span></div>`).join('');
  document.getElementById('add-modal').classList.add('open');
}
function closeAdd(){document.getElementById('add-modal').classList.remove('open');addTarget=null;}
function toggleCheck(el){
  if(el.dataset.key==='all'){const w=!el.classList.contains('checked');document.querySelectorAll('#checklist .check-item').forEach(c=>c.classList.remove('checked'));if(w)el.classList.add('checked');}
  else{document.querySelectorAll('#checklist .check-item[data-key="all"]').forEach(c=>c.classList.remove('checked'));el.classList.toggle('checked');}
  document.querySelectorAll('#checklist .check-item.checked .check-box').forEach(b=>b.textContent='✓');
  document.querySelectorAll('#checklist .check-item:not(.checked) .check-box').forEach(b=>b.textContent='');
}
async function confirmAdd(){
  const label=document.getElementById('ev-label').value.trim();
  const products=[...document.querySelectorAll('#checklist .check-item.checked')].map(el=>el.dataset.key);
  if(!label||!addTarget)return;
  if(!products.length){alert('Selecione ao menos um produto.');return;}
  const{data,error}=await sb.from('events').insert({date:addTarget,label,products}).select().single();
  if(!error)EVENTS.push(data);
  closeAdd();renderWeek();
}
async function removeEv(e,id){
  e.stopPropagation();
  await sb.from('events').delete().eq('id',id);
  EVENTS=EVENTS.filter(ev=>ev.id!==id);
  renderWeek();
}

// ── PRODUTOS ──
function renderProducts(){
  const grid=document.getElementById('prod-grid');grid.innerHTML='';
  PRODUCTS.forEach(p=>{
    const f=p.ficha||{};
    const opt=PROD_OPTS.find(o=>o.key===p.id)||PROD_OPTS[5];
    const color=p.color||opt.color,bg=opt.bg;
    const el=document.createElement('div');el.className='prod-card';
    el.style.borderColor=color+'22';
    el.innerHTML=`<div class="prod-badge" style="background:${bg};color:${color}"><div class="prod-badge-dot" style="background:${color}"></div>${p.badge}</div><div class="prod-name">${p.name}</div><div class="prod-tagline">${p.tagline}</div><div class="prod-price">${f.precoIntegral||'—'}</div><div class="prod-price-label">${f.frequencia||''}</div><div class="prod-arrow" style="color:${color}88"><i class="ti ti-arrow-up-right"></i></div>`;
    el.addEventListener('mouseenter',()=>el.style.borderColor=color+'55');
    el.addEventListener('mouseleave',()=>el.style.borderColor=color+'22');
    el.onclick=()=>openProduct(p.id);
    grid.appendChild(el);
  });
}
function openProduct(id){
  currentProdId=id;
  const p=PRODUCTS.find(x=>x.id===id);
  if(p){renderFicha(p,false);document.getElementById('prod-modal').classList.add('open');}
}
function closeProd(){document.getElementById('prod-modal').classList.remove('open');currentProdId=null;}
function renderFicha(p,editing){
  const f=p.ficha||{};
  const opt=PROD_OPTS.find(o=>o.key===p.id)||PROD_OPTS[5];
  const color=p.color||opt.color,bg=opt.bg;
  const secs=FICHA_SEC.map(s=>{
    const fs=s.fields.map(field=>{
      const val=f[field.key]||'';
      const cls='ficha-value'+(editing?' editable':'')+(val?'':' empty');
      return `<div class="ficha-field"><div class="ficha-label">${field.label}</div><div class="${cls}" data-key="${field.key}" ${editing?'contenteditable="true"':''}>${val||(editing?'':'—')}</div></div>`;
    }).join('');
    return `<div class="ficha-section"><div class="ficha-section-title">${s.title}</div><div class="ficha-grid${s.fields.length===1?' full':''}">${fs}</div></div>`;
  }).join('');
  const bar=editing
    ?`<div class="edit-bar active"><span><i class="ti ti-pencil" style="vertical-align:-2px;margin-right:6px"></i>Editando</span><div class="edit-bar-btns"><span id="save-status" style="font-size:11px;color:var(--gold-dim)"></span><button class="btn-sm" onclick="cancelEdit()">Cancelar</button><button class="btn-sm primary" onclick="saveEdit('${p.id}')">Salvar</button></div></div>`
    :`<div class="edit-bar"><span>Ficha do produto</span><div class="edit-bar-btns"><button class="btn-sm" onclick="startEdit('${p.id}')"><i class="ti ti-pencil" style="font-size:11px;vertical-align:-1px;margin-right:4px"></i>Editar</button></div></div>`;
  document.getElementById('modal-body').innerHTML=`<div class="ficha-badge" style="background:${bg};color:${color}"><div class="ficha-badge-dot" style="background:${color}"></div>${p.badge}</div><div class="ficha-name">${p.name}</div><div class="ficha-tagline-el">${p.tagline}</div>${bar}${secs}`;
}
function startEdit(id){const p=PRODUCTS.find(x=>x.id===id);if(p)renderFicha(p,true);}
function cancelEdit(){const p=PRODUCTS.find(x=>x.id===currentProdId);if(p)renderFicha(p,false);}
async function saveEdit(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return;
  const st=document.getElementById('save-status');if(st)st.textContent='Salvando...';
  const upd={...(p.ficha||{})};
  document.querySelectorAll('.ficha-value[data-key]').forEach(el=>{upd[el.dataset.key]=el.textContent.trim();});
  const{error}=await sb.from('products').update({ficha:upd,updated_at:new Date().toISOString()}).eq('id',id);
  if(!error){p.ficha=upd;renderFicha(p,false);renderProducts();}
  else if(st)st.textContent='Erro.';
}

// ── TIME ──
const TEAM=[
  {initials:'VA',name:'Dra. Vivian Amaral',role:'Expert & Fundadora',resp:['Criação e entrega de conteúdo','Aulas e lives ao vivo','Posicionamento e estratégia']},
  {initials:'—',name:'[Nome]',role:'Gestor(a) de Tráfego',resp:['Campanhas pagas','Relatórios de performance','Testes de criativos']},
  {initials:'—',name:'[Nome]',role:'Produtor(a) de Conteúdo',resp:['Roteiros e edição','Calendário editorial','Entrega de materiais']},
  {initials:'—',name:'[Nome]',role:'Atendimento / CS',resp:['Suporte a alunos','Gestão de grupos','Onboarding de novos alunos']},
];
function renderTeam(){
  const grid=document.getElementById('team-grid');grid.innerHTML='';
  TEAM.forEach(m=>{
    const el=document.createElement('div');el.className='team-card';
    el.innerHTML=`<div class="team-avatar">${m.initials}</div><div class="team-name">${m.name}</div><div class="team-role">${m.role}</div><ul class="team-resp">${m.resp.map(r=>`<li>${r}</li>`).join('')}</ul>`;
    grid.appendChild(el);
  });
  const add=document.createElement('button');add.className='team-add';add.innerHTML='<i class="ti ti-plus"></i>Adicionar membro';add.onclick=()=>alert('Edite o array TEAM no HTML.');grid.appendChild(add);
}

// ── ACESSOS ──
function maskS(s){return '•'.repeat(Math.min((s||'').length,14));}
function escQ(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function renderAcessos(){
  const c=document.getElementById('acessos-list');c.innerHTML='';
  const hdr=document.createElement('div');hdr.className='acesso-row-item list-header';
  hdr.innerHTML='<div class="acesso-cell header">Plataforma</div><div class="acesso-cell header">URL</div><div class="acesso-cell header">Login</div><div class="acesso-cell header">Senha</div><div class="acesso-cell header"></div>';
  c.appendChild(hdr);
  ACESSOS.forEach(a=>{
    const row=document.createElement('div');row.className='acesso-row-item';
    row.innerHTML=`
      <div class="acesso-cell"><span class="acesso-cell-nome">${a.plataforma}</span></div>
      <div class="acesso-cell">${a.url?`<a class="acesso-cell-val" href="${a.url}" target="_blank" style="color:var(--text-muted);font-size:11px;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1" title="${a.url}">${a.url}</a><button class="copy-btn" onclick="copyT(this,'${escQ(a.url)}')" title="Copiar"><i class="ti ti-copy"></i></button>`:'<span style="color:var(--dark4);font-size:12px">—</span>'}</div>
      <div class="acesso-cell"><span class="acesso-cell-val" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.login}</span><button class="copy-btn" onclick="copyT(this,'${escQ(a.login)}')" title="Copiar login"><i class="ti ti-copy"></i></button></div>
      <div class="acesso-cell"><span class="acesso-cell-val acesso-cell-senha-val" data-raw="${escQ(a.senha)}" data-show="false" style="flex:1;letter-spacing:.5px">${maskS(a.senha)}</span><button class="copy-btn" onclick="toggleSenha(this)"><i class="ti ti-eye"></i></button><button class="copy-btn" onclick="copyT(this,'${escQ(a.senha)}')" title="Copiar senha"><i class="ti ti-copy"></i></button></div>
      <div class="acesso-cell acesso-cell-actions">${a.url?`<a class="acesso-icon-btn" href="${a.url}" target="_blank"><i class="ti ti-external-link"></i></a>`:''}<button class="acesso-icon-btn" onclick="openEditAcesso('${a.id}')"><i class="ti ti-pencil"></i></button></div>
      ${a.obs?`<div class="acesso-obs-row"><i class="ti ti-alert-triangle" style="font-size:12px;flex-shrink:0"></i>${a.obs}</div>`:''}`;
    c.appendChild(row);
  });
}
function toggleSenha(btn){
  const cell=btn.closest('.acesso-cell');
  const el=cell.querySelector('.acesso-cell-senha-val');
  const show=el.dataset.show==='true';
  el.textContent=show?maskS(el.dataset.raw):el.dataset.raw;
  el.dataset.show=show?'false':'true';
  btn.innerHTML=show?'<i class="ti ti-eye"></i>':'<i class="ti ti-eye-off"></i>';
}
function copyT(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    const o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check"></i>';btn.style.color='var(--gold)';
    setTimeout(()=>{btn.innerHTML=o;btn.style.color='';},1400);
  });
}
function openEditAcesso(id){
  editingAcessoId=id||null;
  const a=id?ACESSOS.find(x=>x.id===id):{id:'',plataforma:'',url:'',login:'',senha:'',obs:''};
  document.getElementById('acesso-modal-title').textContent=id?'Editar acesso':'Novo acesso';
  document.getElementById('acesso-delete-btn').style.display=id?'flex':'none';
  ['plataforma','url','login','senha','obs'].forEach(k=>document.getElementById('af-'+k).value=a[k]||'');
  document.getElementById('acesso-modal').classList.add('open');
}
function closeAcessoModal(){document.getElementById('acesso-modal').classList.remove('open');editingAcessoId=null;}
async function saveAcesso(){
  const p=document.getElementById('af-plataforma').value.trim();
  if(!p){alert('Nome da plataforma é obrigatório.');return;}
  const data={id:editingAcessoId||('a'+Date.now()),plataforma:p,url:document.getElementById('af-url').value.trim(),login:document.getElementById('af-login').value.trim(),senha:document.getElementById('af-senha').value.trim(),obs:document.getElementById('af-obs').value.trim()};
  if(editingAcessoId){
    await sb.from('acessos').update(data).eq('id',editingAcessoId);
    const i=ACESSOS.findIndex(x=>x.id===editingAcessoId);if(i>-1)ACESSOS[i]=data;
  } else {
    await sb.from('acessos').insert(data);
    ACESSOS.push(data);
  }
  closeAcessoModal();renderAcessos();
}
async function deleteAcesso(){
  if(!confirm('Remover?'))return;
  await sb.from('acessos').delete().eq('id',editingAcessoId);
  ACESSOS=ACESSOS.filter(x=>x.id!==editingAcessoId);
  closeAcessoModal();renderAcessos();
}

// ── USUÁRIOS ──
async function renderUsuarios(){
  const{data}=await sb.from('usuarios').select('*').order('created_at');
  USUARIOS=data||[];
  const c=document.getElementById('users-list');c.innerHTML='';
  const hdr=document.createElement('div');hdr.className='user-row list-header';
  hdr.innerHTML='<div class="user-cell header">Nome</div><div class="user-cell header">E-mail</div><div class="user-cell header">Nível</div><div class="user-cell header"></div>';
  c.appendChild(hdr);
  USUARIOS.forEach(u=>{
    const row=document.createElement('div');row.className='user-row';
    const n=document.createElement('div');n.className='user-cell';n.textContent=u.nome||'—';
    const e=document.createElement('div');e.className='user-cell';e.textContent=u.email||'—';
    const nv=document.createElement('div');nv.className='user-cell';
    const b=document.createElement('span');b.className='nivel-badge '+u.nivel;b.textContent=u.nivel==='adm'?'Administrativo':'Equipe';
    nv.appendChild(b);
    const ac=document.createElement('div');ac.className='user-cell';
    const eb=document.createElement('button');eb.className='acesso-icon-btn';eb.innerHTML='<i class="ti ti-pencil"></i>';eb.onclick=()=>openEditUsuario(u.id);
    ac.appendChild(eb);
    [n,e,nv,ac].forEach(el=>row.appendChild(el));
    c.appendChild(row);
  });
}
function openEditUsuario(id){
  editingUsuarioId=id||null;
  const u=id?USUARIOS.find(x=>x.id===id):null;
  document.getElementById('usuario-modal-title').textContent=id?'Editar usuário':'Novo usuário';
  document.getElementById('usuario-delete-btn').style.display=id?'flex':'none';
  document.getElementById('uf-senha-field').style.display='block';
  document.getElementById('uf-nome').value=u?.nome||'';
  document.getElementById('uf-email').value=u?.email||'';
  document.getElementById('uf-senha').value=u?.senha||'';
  document.getElementById('uf-nivel').value=u?.nivel||'equipe';
  document.getElementById('usuario-status').textContent='';
  document.getElementById('usuario-modal').classList.add('open');
}
function closeUsuarioModal(){document.getElementById('usuario-modal').classList.remove('open');editingUsuarioId=null;}
async function saveUsuario(){
  const nome=document.getElementById('uf-nome').value.trim();
  const email=document.getElementById('uf-email').value.trim();
  const senha=document.getElementById('uf-senha').value.trim();
  const nivel=document.getElementById('uf-nivel').value;
  const st=document.getElementById('usuario-status');
  if(!nome||!email||!senha){alert('Nome, e-mail e senha são obrigatórios.');return;}
  st.textContent='Salvando...';
  if(editingUsuarioId){
    const{error}=await sb.from('usuarios').update({nome,email,senha,nivel}).eq('id',editingUsuarioId);
    if(error){st.textContent='Erro.';return;}
  } else {
    const{error}=await sb.from('usuarios').insert({nome,email,senha,nivel});
    if(error){st.textContent='Erro.';return;}
  }
  st.textContent='Salvo!';
  setTimeout(closeUsuarioModal,600);
  renderUsuarios();
}
async function deleteUsuario(){
  if(!confirm('Remover?'))return;
  await sb.from('usuarios').delete().eq('id',editingUsuarioId);
  closeUsuarioModal();renderUsuarios();
}
</script>
